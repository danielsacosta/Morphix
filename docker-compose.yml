services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      PROJECT_NAME: morphix
      ENVIRONMENT: local
      RUNTIME_BACKEND: local
      LOCAL_DATA_DIR: /var/lib/morphix
      LOCAL_PUBLIC_URL: http://localhost:8000
      LOCAL_URL_SECRET: morphix-local-development-secret
      REDIS_URL: redis://redis:6379/0
      CONVERSION_STREAM: morphix:conversions
      REALTIME_CHANNEL: morphix:job-events
      JOBS_TABLE_NAME: morphix-dev-jobs
      INPUT_BUCKET: morphix-dev-input
      OUTPUT_BUCKET: morphix-dev-output
      LOCAL_REALTIME: "1"
    volumes:
      - ./apps/api/src:/app/src
      - morphix_local_data:/var/lib/morphix
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.dev
    environment:
      PYTHONUNBUFFERED: "1"
      PROJECT_NAME: morphix
      ENVIRONMENT: local
      RUNTIME_BACKEND: local
      LOCAL_DATA_DIR: /var/lib/morphix
      REDIS_URL: redis://redis:6379/0
      CONVERSION_STREAM: morphix:conversions
      REALTIME_CHANNEL: morphix:job-events
      JOBS_TABLE_NAME: morphix-dev-jobs
      INPUT_BUCKET: morphix-dev-input
      OUTPUT_BUCKET: morphix-dev-output
      WORKDIR: /tmp/morphix
    volumes:
      - ./apps/worker/src:/app/src:ro
      - morphix_local_data:/var/lib/morphix
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      WEBSOCKET_API_URL: ws://localhost:8000/ws
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./package.json:/app/package.json:ro
      - ./bun.lock:/app/bun.lock:ro
      - /app/apps/frontend/node_modules
      - /app/node_modules
    working_dir: /app/apps/frontend
    command: >-
      sh -c "mkdir -p public && echo '{\"apiBaseUrl\":\"http://localhost:8000\",\"websocketApiUrl\":\"ws://localhost:8000/ws\",\"maxFileSizeMb\":100}'
      > public/runtime-config.json && exec bun run dev"
    depends_on:
      - api

volumes:
  morphix_local_data:
