name: Infra Lifecycle

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
          - destroy-and-recreate
      confirm_destroy:
        description: Type "destroy morphix dev" for destructive actions
        required: false
        type: string

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  PROJECT_NAME: morphix
  ENVIRONMENT: dev
  TERRAGRUNT_VERSION: 0.98.0

jobs:
  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: inputs.action != 'destroy'
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v6
        if: inputs.action != 'destroy'
        with:
          enable-cache: true

      - name: Build API Lambda package
        if: inputs.action != 'destroy'
        working-directory: apps/api
        run: |
          ./scripts/build_lambda.sh
          echo "API_LAMBDA_PACKAGE=${GITHUB_WORKSPACE}/apps/api/lambda_dist/morphix-api.zip" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Install Terragrunt
        run: |
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate destructive confirmation
        if: inputs.action == 'destroy' || inputs.action == 'destroy-and-recreate'
        run: |
          if [[ "${{ inputs.confirm_destroy }}" != "destroy morphix dev" ]]; then
            echo "Destructive actions require exact confirmation."
            exit 1
          fi

      - name: Bootstrap Terraform remote state
        run: bash .github/scripts/bootstrap-terraform-state.sh

      - name: Pre-destroy cleanup
        if: inputs.action == 'destroy' || inputs.action == 'destroy-and-recreate'
        run: bash .github/scripts/pre-destroy-cleanup.sh

      - name: Run lifecycle action
        shell: bash
        run: |
          set -euo pipefail
          STACKS=(
            "infra/terraform/live/shared/network"
            "infra/terraform/live/shared/storage"
            "infra/terraform/live/shared/jobs-db"
            "infra/terraform/live/shared/ecs"
            "infra/terraform/live/shared/conversion-queue"
            "infra/terraform/live/services/worker"
            "infra/terraform/live/services/api"
            "infra/terraform/live/shared/observability"
            "infra/terraform/envs/frontend"
          )

          run_stack() {
            local command="$1"
            local stack="$2"
            echo "::group::${command} ${stack}"
            (cd "${stack}" && terragrunt "${command}" -input=false -no-color)
            echo "::endgroup::"
          }

          run_apply_stack() {
            local stack="$1"
            echo "::group::apply ${stack}"
            (cd "${stack}" && terragrunt apply -input=false -no-color -auto-approve)
            echo "::endgroup::"
          }

          run_destroy_stack() {
            local stack="$1"
            echo "::group::destroy ${stack}"
            (cd "${stack}" && terragrunt destroy -input=false -no-color -auto-approve)
            echo "::endgroup::"
          }

          refresh_browser_cors() {
            echo "::group::resolve browser origins"
            source .github/scripts/resolve-browser-origins.sh
            echo "::endgroup::"

            if [[ -z "${FRONTEND_ORIGIN:-}" ]]; then
              echo "Frontend origin was not resolved; skipping browser CORS refresh."
              return 0
            fi

            run_apply_stack "infra/terraform/live/shared/storage"
            run_apply_stack "infra/terraform/live/services/api"
          }

          ACTION="${{ inputs.action }}"
          if [[ "${ACTION}" == "destroy" || "${ACTION}" == "destroy-and-recreate" ]]; then
            if [[ "${{ inputs.confirm_destroy }}" != "destroy morphix dev" ]]; then
              echo "Destructive actions require exact confirmation."
              exit 1
            fi
            export FRONTEND_FORCE_DESTROY=true
            export STORAGE_FORCE_DESTROY=true
            export WORKER_REPOSITORY_FORCE_DELETE=true
          fi

          if [[ "${ACTION}" == "plan" ]]; then
            for stack in "${STACKS[@]}"; do run_stack plan "${stack}"; done
          elif [[ "${ACTION}" == "apply" ]]; then
            for stack in "${STACKS[@]}"; do run_apply_stack "${stack}"; done
            refresh_browser_cors
          elif [[ "${ACTION}" == "destroy" ]]; then
            for (( idx=${#STACKS[@]}-1 ; idx>=0 ; idx-- )); do run_destroy_stack "${STACKS[idx]}"; done
          elif [[ "${ACTION}" == "destroy-and-recreate" ]]; then
            for (( idx=${#STACKS[@]}-1 ; idx>=0 ; idx-- )); do run_destroy_stack "${STACKS[idx]}"; done
            unset FRONTEND_FORCE_DESTROY STORAGE_FORCE_DESTROY WORKER_REPOSITORY_FORCE_DELETE
            for stack in "${STACKS[@]}"; do run_apply_stack "${stack}"; done
            refresh_browser_cors
          fi

      - name: Post-destroy final cleanup
        if: inputs.action == 'destroy'
        run: bash .github/scripts/post-destroy-cleanup.sh
