name: API Deploy

on:
  push:
    branches: [main]
    paths:
      - apps/api/**
      - infra/blueprints/modules/api/**
      - infra/terraform/live/services/api/**
      - .github/workflows/api-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  PROJECT_NAME: morphix
  ENVIRONMENT: dev
  TERRAGRUNT_VERSION: 0.98.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Test API
        run: uv run --group dev pytest apps/api/tests

      - name: Build API Lambda package
        working-directory: apps/api
        run: ./scripts/build_lambda.sh

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Install Terragrunt
        run: |
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Apply API Lambda runtime
        working-directory: infra/terraform/live/services/api
        run: |
          API_LAMBDA_PACKAGE="${GITHUB_WORKSPACE}/apps/api/lambda_dist/morphix-api.zip" \
            terragrunt apply -input=false -no-color -auto-approve
