name: Destroy Dev Infrastructure

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: Type "destroy morphix dev"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: morphix
  ENVIRONMENT: dev
  TERRAGRUNT_VERSION: 0.98.0

jobs:
  destroy:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_SCHEDULED_DESTROY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Install Terragrunt
        run: |
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ inputs.confirm_destroy }}" != "destroy morphix dev" ]]; then
            echo "Missing destructive action confirmation."
            exit 1
          fi

      - name: Destroy stacks in reverse order
        shell: bash
        run: |
          set -euo pipefail
          STACKS=(
            "infra/terraform/envs/frontend"
            "infra/terraform/live/shared/observability"
            "infra/terraform/live/services/api"
            "infra/terraform/live/shared/step-functions"
            "infra/terraform/live/services/worker"
            "infra/terraform/live/shared/ecs"
            "infra/terraform/live/shared/jobs-db"
            "infra/terraform/live/shared/storage"
            "infra/terraform/live/shared/network"
          )
          for stack in "${STACKS[@]}"; do
            echo "::group::destroy ${stack}"
            (cd "${stack}" && terragrunt destroy -input=false -no-color -auto-approve)
            echo "::endgroup::"
          done

