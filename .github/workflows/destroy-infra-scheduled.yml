name: Destroy Dev Infrastructure

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: Type "destroy morphix dev"
        required: true
        type: string

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  PROJECT_NAME: morphix
  ENVIRONMENT: dev
  TERRAGRUNT_VERSION: 0.98.0

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_destroy: ${{ steps.scope.outputs.should_destroy }}
    steps:
      - id: scope
        env:
          ENABLE_SCHEDULED_DESTROY: "false"
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "${ENABLE_SCHEDULED_DESTROY}" == "true" ]]; then
            echo "should_destroy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_destroy=false" >> "$GITHUB_OUTPUT"
          fi

  destroy:
    needs: guard
    if: needs.guard.outputs.should_destroy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Install Terragrunt
        run: |
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ inputs.confirm_destroy }}" != "destroy morphix dev" ]]; then
            echo "Missing destructive action confirmation."
            exit 1
          fi

      - name: Destroy stacks in reverse order
        shell: bash
        run: |
          set -euo pipefail
          STACKS=(
            "infra/terraform/envs/frontend"
            "infra/terraform/live/shared/observability"
            "infra/terraform/live/services/api"
            "infra/terraform/live/services/worker"
            "infra/terraform/live/shared/ecs"
            "infra/terraform/live/shared/jobs-db"
            "infra/terraform/live/shared/storage"
            "infra/terraform/live/shared/network"
          )
          for stack in "${STACKS[@]}"; do
            echo "::group::destroy ${stack}"
            (cd "${stack}" && terragrunt destroy -input=false -no-color -auto-approve)
            echo "::endgroup::"
          done
